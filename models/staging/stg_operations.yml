version: 2

sources:
  - name: raw
    database: FINANCE_ANALYTICS
    schema: RAW
    tables:
      - name: fct_cases
        description: "Raw finance operations case data"
        columns:
          - name: case_id
            tests:
              - not_null
              - unique

models:
  - name: stg_operations
    description: "Cleaned and standardized finance operations case data"
    columns:
      - name: case_id
        tests:
          - not_null
          - unique

      - name: date
        tests:
          - not_null

      - name: lob
        tests:
          - not_null
          - accepted_values:
              values: ['MOTOR', 'HEALTH', 'PL', 'PCL']

      - name: region
        tests:
          - not_null
          - accepted_values:
              values: ['EMEA', 'APAC', 'NA']

      - name: agent_level
        tests:
          - not_null
          - accepted_values:
              values: ['L1', 'L2', 'L3']

      - name: case_type
        tests:
          - not_null
          - accepted_values:
              values: ['SUBMISSION', 'REFERRAL', 'CLAIM']

      - name: sla_status
        tests:
          - not_null
          - accepted_values:
              values: ['WITHIN SLA', 'BREACHED', 'MET', 'FAILED']

      - name: premium_amount
        tests:
          - not_null
          - dbt_utils.accepted_range:
              min_value: 0
              inclusive: true

      - name: claim_amount
        tests:
          - not_null
          - dbt_utils.accepted_range:
              min_value: 0
              inclusive: true

      - name: tat_hours
        tests:
          - not_null
          - dbt_utils.accepted_range:
              min_value: 0
              inclusive: true

      - name: customer_satisfaction
        tests:
          - dbt_utils.accepted_range:
              min_value: 1
              max_value: 5
              inclusive: true