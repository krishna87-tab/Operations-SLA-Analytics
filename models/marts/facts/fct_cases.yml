version: 2

models:
  - name: fct_cases
    description: "Case-level finance operations fact table with dimensional keys and process metrics"
    columns:
      - name: case_id
        tests:
          - not_null
          - unique

      - name: date_key
        tests:
          - not_null
          - relationships:
              to: ref('dim_date')
              field: date_key

      - name: lob_key
        tests:
          - not_null
          - relationships:
              to: ref('dim_lob')
              field: lob_key

      - name: region_key
        tests:
          - not_null
          - relationships:
              to: ref('dim_region')
              field: region_key

      - name: agent_key
        tests:
          - not_null
          - relationships:
              to: ref('dim_agent')
              field: agent_key

      - name: case_type_key
        tests:
          - not_null
          - relationships:
              to: ref('dim_case_type')
              field: case_type_key

      - name: sla_key
        tests:
          - not_null
          - relationships:
              to: ref('dim_sla')
              field: sla_key

      - name: case_count
        tests:
          - not_null
          - accepted_values:
              values: [1]